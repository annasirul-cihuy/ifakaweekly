<!DOCTYPE html>
<html>
<head>
    <style>
        /* CSS untuk mempercantik tabel */
        table {
            width: 100%;
            border-collapse: collapse; /* Menghilangkan garis ganda */
        }
        th, td {
            border: 2px solid #080000;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

    <h2>Daftar Harga Produk</h2>

    <table>
        <tr>
            <th>Nama Produk</th>
            <th>Harga</th>
            <th>Stok</th>
        </tr>
        <tr>
            <td>Apel Malang</td>
            <td>Rp 25.000</td>
            <td>50 kg</td>
        </tr>
        <tr>
            <td>Jeruk Medan</td>
            <td>Rp 15.000</td>
            <td>30 kg</td>
        </tr>
        <tr>
            <td>Mangga Harum Manis</td>
            <td>Rp 20.000</td>
            <td>20 kg</td>
        </tr>
    </table>

</body>
</html>
